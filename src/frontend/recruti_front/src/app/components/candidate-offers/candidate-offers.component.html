<!-- ✅ MODAL ÉDITION PROFIL -->
<div class="modal-overlay" *ngIf="showEditModal()" (click)="closeEditModal()">
  <div class="modal-box" @modalAnim (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="modal-title">Edit Profile</h2>
      <button class="modal-close-btn" (click)="closeEditModal()">✕</button>
    </div>

    <!-- Messages -->
    <div class="modal-success" *ngIf="successMessage()">{{ successMessage() }}</div>
    <div class="modal-error"   *ngIf="errorMessage()">{{ errorMessage() }}</div>

    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" [(ngModel)]="editForm.prenom" placeholder="Prénom" />
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" [(ngModel)]="editForm.nom" placeholder="Nom" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="editForm.email" placeholder="Email" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date de naissance</label>
          <input type="date" [(ngModel)]="editForm.dateNaissance" />
        </div>
        <div class="form-group">
          <label>Sexe</label>
          <select [(ngModel)]="editForm.sexe">
            <option value="">-- Choisir --</option>
            <option value="HOMME">Homme</option>
            <option value="FEMME">Femme</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Gouvernorat</label>
        <input type="text" [(ngModel)]="editForm.gouvernorat" placeholder="Gouvernorat" />
      </div>

      <!-- Champs RECRUTEUR uniquement -->
      <ng-container *ngIf="isRecruteur()">
        <div class="form-group">
          <label>Poste</label>
          <input type="text" [(ngModel)]="editForm.poste" placeholder="Votre poste" />
        </div>
        <div class="form-group">
          <label>Société</label>
          <input type="text" [(ngModel)]="editForm.nomSociete" placeholder="Nom de la société" />
        </div>
      </ng-container>

      <!-- Champs CANDIDAT uniquement -->
      <ng-container *ngIf="!isRecruteur()">
        <div class="form-group">
          <label>Skills</label>
          <input type="text" [(ngModel)]="editForm.skills" placeholder="Ex: Angular, Java, SQL..." />
        </div>
      </ng-container>

      <!-- ← Rôle affiché en lecture seule, non modifiable -->
      <div class="form-group">
        <label>Rôle</label>
        <input type="text"
               [value]="isRecruteur() ? 'Recruteur' : 'Candidat'"
               disabled
               class="input-disabled" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeEditModal()">Annuler</button>
      <button class="btn-save" (click)="saveProfile()" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Enregistrement...' : 'Enregistrer' }}
      </button>
    </div>

  </div>
  </div>
