# nginx.conf (dans /frontend)

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Format de log
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Gestion du routage d'Angular : toutes les routes non-fichiers sont redirigées vers index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Configuration du cache pour les assets statiques
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|ico|jpg|jpeg|png|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Redirection des erreurs 404
        error_page 404 /index.html;

        # Redirection des erreurs serveur vers une page statique
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
