cors.allowed-origins=http://localhost:4200,http://localhost,http://frontend,http://frontend:80
#jwt secret is different from the jwt token, the secret is used to sign the token, 
#while the token is the actual string that is sent to the client
#when jwt secret is changed the old tokens will be invalidated, 
#so it's important to keep the secret safe and not change it frequently (fixe)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}